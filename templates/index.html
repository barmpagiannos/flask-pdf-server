<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PDF Server</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>PDF Files</h1>
        
        <div class="upload-box">
            <form action="/upload" method="post" enctype="multipart/form-data">
                <input type="file" name="file" accept=".pdf" required>
                <button type="submit">Upload</button>
            </form>
        </div>

        <ul class="file-list">
            {% for file in files %}
                <li class="file-item">
                    <a href="/{{ file[:-4] }}" class="file-link">{{ file }}</a>
                    <form class="delete-form" action="/delete/{{ file[:-4] }}" method="post">
                        <button type="button" class="delete-button" data-filename="{{ file }}">Delete</button>
                    </form>
                </li>
            {% else %}
                <li class="empty-msg">No files at the moment.</li>
            {% endfor %}
        </ul>
    </div>

    <div class="modal" id="confirm-modal" aria-hidden="true">
        <div class="modal-backdrop" data-close="true"></div>
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <h2 id="modal-title">Delete PDF?</h2>
            <p id="modal-message">Are you sure you want to delete this file?</p>
            <div class="modal-actions">
                <button type="button" class="modal-cancel" data-close="true">Cancel</button>
                <button type="button" class="modal-confirm" id="modal-confirm">Delete</button>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('confirm-modal');
        const modalMessage = document.getElementById('modal-message');
        const modalConfirm = document.getElementById('modal-confirm');
        let pendingForm = null;

        document.querySelectorAll('.delete-button').forEach((button) => {
            button.addEventListener('click', () => {
                pendingForm = button.closest('form');
                const fileName = button.getAttribute('data-filename');
                modalMessage.textContent = `Are you sure you want to delete ${fileName}?`;
                modal.classList.add('is-open');
                modal.setAttribute('aria-hidden', 'false');
            });
        });

        modalConfirm.addEventListener('click', () => {
            if (pendingForm) {
                pendingForm.submit();
            }
        });

        modal.addEventListener('click', (event) => {
            if (event.target.dataset.close === 'true') {
                modal.classList.remove('is-open');
                modal.setAttribute('aria-hidden', 'true');
                pendingForm = null;
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && modal.classList.contains('is-open')) {
                modal.classList.remove('is-open');
                modal.setAttribute('aria-hidden', 'true');
                pendingForm = null;
            }
        });
    </script>
</body>
</html>
